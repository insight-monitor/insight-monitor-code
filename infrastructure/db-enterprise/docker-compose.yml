
services:
  # Base de datos MySQL con el esquema completo del DER
  mysql-enterprise:
    image: mysql:8.0
    container_name: insight_monitor_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: insight_monitor_enterprise
      MYSQL_USER: insight_user
      MYSQL_PASSWORD: insight_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Este script se ejecuta automáticamente la primera vez que se crea el contenedor
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - insight_network

volumes:
  mysql_data:

networks:
  insight_network:
    driver: bridge
