services:
  sqlite-web:
    image: coleifer/sqlite-web
    container_name: insight_mvp_db_viewer
    restart: always
    ports:
      - "8081:8080"
    volumes:
      # Mount the real MVP project database file
      - ../../backend/data:/data
    command: sqlite_web -H 0.0.0.0 -x /data/insight_monitor.db
    environment:
      - SQLITE_WEB_PASSWORD=${SQLITE_WEB_PASSWORD:-mvppassword}
